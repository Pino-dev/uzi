<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Uzi Sandwich Catcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    overflow: hidden;
    font-family: 'Arial Black', Arial, sans-serif;
    user-select: none;
    touch-action: none;
  }

  #gameContainer {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
  }

  /* Background stars */
  #gameContainer::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background-image:
      radial-gradient(2px 2px at 10% 15%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 25% 40%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 55% 60%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 85% 50%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 5% 75%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 35% 90%, #fff 0%, transparent 100%);
    pointer-events: none;
  }

  /* COUNTDOWN */
  #countdown {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
  }

  #countdownNum {
    font-size: 20vw;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 40px #e94560, 0 0 80px #e94560;
    animation: none;
  }

  @keyframes zoomFade {
    0%   { transform: scale(0.2); opacity: 0; }
    30%  { transform: scale(1.2); opacity: 1; }
    70%  { transform: scale(1);   opacity: 1; }
    100% { transform: scale(2);   opacity: 0; }
  }

  .doAnim { animation: zoomFade 0.9s ease forwards; }

  /* HUD */
  #hud {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(20px, 4vw, 32px);
    color: #fff;
    text-shadow: 0 0 10px #e94560;
    z-index: 10;
    background: rgba(0,0,0,0.4);
    padding: 6px 20px;
    border-radius: 30px;
    border: 2px solid rgba(255,255,255,0.2);
    display: none;
  }

  /* UZI FACE */
  #uzi {
    position: absolute;
    width: 80px;
    height: 80px;
    top: 30px;
    transform: translateX(-50%);
    z-index: 5;
    transition: none;
    filter: drop-shadow(0 0 12px #e94560);
  }

  /* TUBE */
  #tube {
    position: absolute;
    bottom: 0;
    width: 60px;
    transform: translateX(-50%);
    z-index: 5;
    display: none;
  }

  .tube-body {
    width: 60px;
    height: 100px;
    background: linear-gradient(90deg, #888 0%, #ccc 40%, #888 100%);
    border-radius: 8px 8px 0 0;
    border: 3px solid #555;
    position: relative;
    box-shadow: inset -4px 0 8px rgba(0,0,0,0.3), 0 0 20px rgba(100,100,255,0.4);
  }

  .tube-body::after {
    content: '';
    position: absolute;
    top: 8px;
    left: 8px;
    width: 10px;
    height: 70px;
    background: rgba(255,255,255,0.25);
    border-radius: 5px;
  }

  .tube-mouth {
    width: 80px;
    height: 20px;
    background: linear-gradient(90deg, #666 0%, #aaa 40%, #666 100%);
    border-radius: 6px 6px 0 0;
    border: 3px solid #444;
    margin: 0 auto;
    box-shadow: 0 -4px 12px rgba(100,100,255,0.5);
  }

  .tube-nozzle {
    width: 40px;
    height: 14px;
    background: #444;
    border-radius: 4px 4px 0 0;
    margin: 0 auto;
    position: relative;
    border: 2px solid #333;
  }

  /* SANDWICH */
  .sandwich {
    position: absolute;
    font-size: 38px;
    z-index: 4;
    transform: translateX(-50%);
    line-height: 1;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    pointer-events: none;
  }

  /* WIN OVERLAY */
  #winOverlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  #winOverlay.show { display: flex; }

  .trophy {
    font-size: min(20vw, 140px);
    animation: bounce 0.7s infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(-20px) scale(1.1); }
  }

  .winText {
    font-size: clamp(40px, 10vw, 90px);
    color: #fff;
    font-weight: 900;
    text-shadow: 0 0 20px #fff;
    letter-spacing: 4px;
  }

  .uziText {
    font-size: clamp(50px, 13vw, 110px);
    font-weight: 900;
    letter-spacing: 6px;
    animation: rainbow 1s linear infinite;
  }

  @keyframes rainbow {
    0%   { color: #ff0000; text-shadow: 0 0 30px #ff0000; }
    14%  { color: #ff7700; text-shadow: 0 0 30px #ff7700; }
    28%  { color: #ffff00; text-shadow: 0 0 30px #ffff00; }
    42%  { color: #00ff00; text-shadow: 0 0 30px #00ff00; }
    57%  { color: #0099ff; text-shadow: 0 0 30px #0099ff; }
    71%  { color: #8800ff; text-shadow: 0 0 30px #8800ff; }
    85%  { color: #ff00cc; text-shadow: 0 0 30px #ff00cc; }
    100% { color: #ff0000; text-shadow: 0 0 30px #ff0000; }
  }

  #replayBtn {
    margin-top: 10px;
    padding: 16px 50px;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 900;
    color: #fff;
    background: linear-gradient(135deg, #e94560, #7b2ff7);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 0 30px rgba(233,69,96,0.6);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  #replayBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 50px rgba(233,69,96,0.9);
  }

  /* CONFETTI */
  .confetto {
    position: absolute;
    top: -20px;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: fall linear forwards;
    z-index: 210;
    pointer-events: none;
  }

  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }

  /* MOBILE TOUCH BUTTONS */
  #touchControls {
    position: absolute;
    bottom: 130px;
    width: 100%;
    display: none;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 20;
    pointer-events: none;
  }

  .touchBtn {
    width: 70px;
    height: 70px;
    min-width: 60px;
    min-height: 60px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 3px solid rgba(255,255,255,0.4);
    font-size: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: all;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
    color: #fff;
  }

  .touchBtn:active { background: rgba(255,255,255,0.35); }
</style>
</head>
<body>

<div id="gameContainer">
  <!-- COUNTDOWN -->
  <div id="countdown">
    <div id="countdownNum">3</div>
  </div>

  <!-- HUD -->
  <div id="hud">🥪 <span id="score">0</span> / 10</div>

  <!-- UZI FACE -->
  <img id="uzi" src="uzi-chiusa.png" alt="Uzi">

  <!-- TUBE -->
  <div id="tube">
    <div class="tube-nozzle"></div>
    <div class="tube-mouth"></div>
    <div class="tube-body"></div>
  </div>

  <!-- WIN OVERLAY -->
  <div id="winOverlay">
    <div class="trophy">🏆</div>
    <div class="winText">HAI VINTO</div>
    <div class="uziText">UZIIIII!</div>
    <button id="replayBtn" onclick="startCountdown()">GIOCA ANCORA</button>
  </div>

  <!-- TOUCH CONTROLS -->
  <div id="touchControls">
    <div class="touchBtn" id="btnLeft">◀</div>
    <div class="touchBtn" id="btnRight">▶</div>
  </div>
</div>

<script>
// ─── STATE ─────────────────────────────────────────────────────────────────
const SPEED         = 6;
const FIRE_INTERVAL = 1200;
const WIN_COUNT     = 10;
const OPEN_DIST     = 80;
const EAT_DIST      = 50;

function isMobile()           { return window.innerWidth < 600; }
function getUziW()            { return isMobile() ? 70 : 80; }
function getSandwichSpeed()   { return isMobile() ? 2.2 : 3.2; }
function getSandwichFontSize(){ return isMobile() ? '32px' : '38px'; }

function updateTouchControls() {
  document.getElementById('touchControls').style.display =
    isMobile() ? 'flex' : 'none';
}

let uziX, uziY;
let tubeX, tubeDir;
let sandwiches = [];
let score = 0;
let gameRunning = false;
let keys = { left: false, right: false };
let lastFireTime = 0;
let animId = null;
let fireTimerId = null;
let tubeAngle = 0;

// Audio context for beep
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

function playBeep() {
  const ctx = getAudio();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

// ─── DOM REFS ───────────────────────────────────────────────────────────────
const container   = document.getElementById('gameContainer');
const countdownEl = document.getElementById('countdown');
const countNumEl  = document.getElementById('countdownNum');
const hudEl       = document.getElementById('hud');
const scoreEl     = document.getElementById('score');
const uziEl       = document.getElementById('uzi');
const tubeEl      = document.getElementById('tube');
const winOverlay  = document.getElementById('winOverlay');

// ─── COUNTDOWN ──────────────────────────────────────────────────────────────
function startCountdown() {
  // reset game state
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  if (fireTimerId) { clearInterval(fireTimerId); fireTimerId = null; }
  sandwiches.forEach(s => s.el.remove());
  sandwiches = [];
  score = 0;
  scoreEl.textContent = '0';
  gameRunning = false;
  keys.left = keys.right = false;

  // remove old confetti
  document.querySelectorAll('.confetto').forEach(c => c.remove());

  winOverlay.classList.remove('show');
  hudEl.style.display = 'none';
  tubeEl.style.display = 'none';
  uziEl.style.display = 'none';

  countdownEl.style.display = 'flex';

  const steps = ['3', '2', '1', 'START!'];
  let i = 0;

  function nextStep() {
    if (i >= steps.length) {
      countdownEl.style.display = 'none';
      beginGame();
      return;
    }
    countNumEl.classList.remove('doAnim');
    countNumEl.textContent = steps[i];
    // force reflow to restart animation
    void countNumEl.offsetWidth;
    countNumEl.classList.add('doAnim');
    i++;
    setTimeout(nextStep, 950);
  }
  nextStep();
}

// ─── BEGIN GAME ─────────────────────────────────────────────────────────────
function beginGame() {
  const W = container.clientWidth;
  const H = container.clientHeight;

  const UZI_W = getUziW();
  uziX = W / 2;
  uziY = 60;
  tubeX = W / 2;
  tubeDir = 1;
  tubeAngle = 0;

  uziEl.style.width  = UZI_W + 'px';
  uziEl.style.height = UZI_W + 'px';
  uziEl.style.display = 'block';
  uziEl.style.left = uziX + 'px';
  uziEl.style.top  = uziY + 'px';
  uziEl.src = 'uzi-chiusa.png';
  updateTouchControls();

  tubeEl.style.display = 'block';
  tubeEl.style.left = tubeX + 'px';

  hudEl.style.display = 'block';
  gameRunning = true;

  lastFireTime = performance.now();
  gameLoop(performance.now());
}

// ─── SANDWICH FACTORY ───────────────────────────────────────────────────────
function spawnSandwich() {
  const el = document.createElement('div');
  el.className = 'sandwich';
  el.textContent = '🥪';
  el.style.fontSize = getSandwichFontSize();
  container.appendChild(el);
  sandwiches.push({ el, x: tubeX, y: window.innerHeight - 120 });
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
function gameLoop(now) {
  if (!gameRunning) return;

  const W = window.innerWidth;
  const H = window.innerHeight;
  const UZI_W = getUziW();
  const SANDWICH_SPEED = getSandwichSpeed();

  // ── Move Uzi
  if (keys.left)  uziX -= SPEED;
  if (keys.right) uziX += SPEED;
  uziX = Math.max(UZI_W / 2, Math.min(W - UZI_W / 2, uziX));
  uziEl.style.left = uziX + 'px';

  // ── Move Tube (sinusoidal)
  tubeAngle += 0.018;
  tubeX = W / 2 + Math.sin(tubeAngle) * (W / 2 - 60);
  tubeEl.style.left = tubeX + 'px';

  // ── Fire sandwich
  if (now - lastFireTime >= FIRE_INTERVAL) {
    spawnSandwich();
    lastFireTime = now;
  }

  // ── Move sandwiches, check collisions
  const uziCenterX = uziX;
  const uziCenterY = uziY + UZI_W / 2;  // UZI_W already declared above
  let mouthOpen = false;

  // first pass: check proximity to decide mouth state
  for (const s of sandwiches) {
    const dy = uziCenterY - s.y;
    if (dy >= 0 && dy <= OPEN_DIST) { mouthOpen = true; break; }
  }

  uziEl.src = mouthOpen ? 'uzi-aperta.png' : 'uzi-chiusa.png';

  const toRemove = [];

  for (let i = 0; i < sandwiches.length; i++) {
    const s = sandwiches[i];
    s.y -= SANDWICH_SPEED;
    s.el.style.left = s.x + 'px';
    s.el.style.top  = s.y + 'px';

    // off top
    if (s.y < -50) { toRemove.push(i); continue; }

    // eat check
    const dx = Math.abs(s.x - uziCenterX);
    const dy = Math.abs(s.y - uziCenterY);
    if (mouthOpen && dx < EAT_DIST && dy < EAT_DIST) {
      toRemove.push(i);
      score++;
      scoreEl.textContent = score;
      playBeep();
      if (score >= WIN_COUNT) { triggerWin(); return; }
    }
  }

  // remove in reverse order
  for (let i = toRemove.length - 1; i >= 0; i--) {
    sandwiches[toRemove[i]].el.remove();
    sandwiches.splice(toRemove[i], 1);
  }

  animId = requestAnimationFrame(gameLoop);
}

// ─── WIN ─────────────────────────────────────────────────────────────────────
function triggerWin() {
  gameRunning = false;
  sandwiches.forEach(s => s.el.remove());
  sandwiches = [];
  uziEl.src = 'uzi-aperta.png';

  winOverlay.classList.add('show');
  spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#ff0000','#ff7700','#ffff00','#00ff00','#00ccff','#8800ff','#ff00cc','#fff'];
  const W = container.clientWidth;
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetto';
    el.style.left   = Math.random() * W + 'px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width  = (8 + Math.random() * 10) + 'px';
    el.style.height = (8 + Math.random() * 10) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    const dur = 2 + Math.random() * 3;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay    = (Math.random() * 1.5) + 's';
    container.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  { keys.left  = true; e.preventDefault(); }
  if (e.key === 'ArrowRight') { keys.right = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  keys.left  = false;
  if (e.key === 'ArrowRight') keys.right = false;
});

// Touch buttons
const btnLeft  = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
btnLeft.addEventListener('touchstart',  e => { keys.left  = true;  e.preventDefault(); }, { passive: false });
btnLeft.addEventListener('touchend',    e => { keys.left  = false; e.preventDefault(); }, { passive: false });
btnLeft.addEventListener('mousedown',   () => keys.left  = true);
btnLeft.addEventListener('mouseup',     () => keys.left  = false);
btnLeft.addEventListener('mouseleave',  () => keys.left  = false);
btnRight.addEventListener('touchstart', e => { keys.right = true;  e.preventDefault(); }, { passive: false });
btnRight.addEventListener('touchend',   e => { keys.right = false; e.preventDefault(); }, { passive: false });
btnRight.addEventListener('mousedown',  () => keys.right = true);
btnRight.addEventListener('mouseup',    () => keys.right = false);
btnRight.addEventListener('mouseleave', () => keys.right = false);

// ─── PREVENT SCROLL ON TOUCH ─────────────────────────────────────────────────
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ─── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const W = window.innerWidth;
  const UZI_W = getUziW();
  uziEl.style.width  = UZI_W + 'px';
  uziEl.style.height = UZI_W + 'px';
  if (gameRunning) {
    uziX = Math.max(UZI_W / 2, Math.min(W - UZI_W / 2, uziX));
    tubeX = Math.max(60, Math.min(W - 60, tubeX));
  }
  updateTouchControls();
});

// ─── START ───────────────────────────────────────────────────────────────────
startCountdown();
</script>
</body>
</html>
