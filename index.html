<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Uzi Sandwich Catcher</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    overflow: hidden;
    font-family: 'Arial Black', Arial, sans-serif;
    user-select: none;
    touch-action: none;
  }

  #gameContainer {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
  }

  /* Background stars */
  #gameContainer::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background-image:
      radial-gradient(2px 2px at 10% 15%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 25% 40%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 8%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 55% 60%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 85% 50%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 5% 75%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 35% 90%, #fff 0%, transparent 100%);
    pointer-events: none;
  }

  /* COUNTDOWN */
  #countdown {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
  }

  #countdownNum {
    font-size: 20vw;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 40px #e94560, 0 0 80px #e94560;
    animation: none;
  }

  @keyframes zoomFade {
    0%   { transform: scale(0.2); opacity: 0; }
    30%  { transform: scale(1.2); opacity: 1; }
    70%  { transform: scale(1);   opacity: 1; }
    100% { transform: scale(2);   opacity: 0; }
  }

  .doAnim { animation: zoomFade 0.9s ease forwards; }

  /* HUD */
  #hud {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(20px, 4vw, 32px);
    color: #fff;
    text-shadow: 0 0 10px #e94560;
    z-index: 10;
    background: rgba(0,0,0,0.4);
    padding: 6px 20px;
    border-radius: 30px;
    border: 2px solid rgba(255,255,255,0.2);
    display: none;
  }

  /* UZI FACE */
  #uzi {
    position: absolute;
    width: 80px;
    height: 80px;
    top: 30px;
    transform: translateX(-50%);
    z-index: 5;
    transition: none;
    filter: drop-shadow(0 0 12px #e94560);
  }

  /* TUBE */
  #tube {
    position: absolute;
    bottom: 0;
    width: 60px;
    transform: translateX(-50%);
    z-index: 5;
    display: none;
  }

  .tube-body {
    width: 60px;
    height: 100px;
    background: linear-gradient(90deg, #888 0%, #ccc 40%, #888 100%);
    border-radius: 8px 8px 0 0;
    border: 3px solid #555;
    position: relative;
    box-shadow: inset -4px 0 8px rgba(0,0,0,0.3), 0 0 20px rgba(100,100,255,0.4);
  }

  .tube-body::after {
    content: '';
    position: absolute;
    top: 8px;
    left: 8px;
    width: 10px;
    height: 70px;
    background: rgba(255,255,255,0.25);
    border-radius: 5px;
  }

  .tube-mouth {
    width: 80px;
    height: 20px;
    background: linear-gradient(90deg, #666 0%, #aaa 40%, #666 100%);
    border-radius: 6px 6px 0 0;
    border: 3px solid #444;
    margin: 0 auto;
    box-shadow: 0 -4px 12px rgba(100,100,255,0.5);
  }

  .tube-nozzle {
    width: 40px;
    height: 14px;
    background: #444;
    border-radius: 4px 4px 0 0;
    margin: 0 auto;
    position: relative;
    border: 2px solid #333;
  }

  /* SANDWICH */
  .sandwich {
    position: absolute;
    font-size: 38px;
    z-index: 4;
    transform: translateX(-50%);
    line-height: 1;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    pointer-events: none;
  }

  /* WIN OVERLAY */
  #winOverlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  #winOverlay.show { display: flex; }

  .trophy {
    font-size: min(20vw, 140px);
    animation: bounce 0.7s infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0) scale(1); }
    to   { transform: translateY(-20px) scale(1.1); }
  }

  .winText {
    font-size: clamp(40px, 10vw, 90px);
    color: #fff;
    font-weight: 900;
    text-shadow: 0 0 20px #fff;
    letter-spacing: 4px;
  }

  .uziText {
    font-size: clamp(50px, 13vw, 110px);
    font-weight: 900;
    letter-spacing: 6px;
    animation: rainbow 1s linear infinite;
  }

  @keyframes rainbow {
    0%   { color: #ff0000; text-shadow: 0 0 30px #ff0000; }
    14%  { color: #ff7700; text-shadow: 0 0 30px #ff7700; }
    28%  { color: #ffff00; text-shadow: 0 0 30px #ffff00; }
    42%  { color: #00ff00; text-shadow: 0 0 30px #00ff00; }
    57%  { color: #0099ff; text-shadow: 0 0 30px #0099ff; }
    71%  { color: #8800ff; text-shadow: 0 0 30px #8800ff; }
    85%  { color: #ff00cc; text-shadow: 0 0 30px #ff00cc; }
    100% { color: #ff0000; text-shadow: 0 0 30px #ff0000; }
  }

  #replayBtn {
    margin-top: 10px;
    padding: 16px 50px;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 900;
    color: #fff;
    background: linear-gradient(135deg, #e94560, #7b2ff7);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 0 30px rgba(233,69,96,0.6);
    transition: transform 0.1s, box-shadow 0.1s;
  }

  #replayBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 50px rgba(233,69,96,0.9);
  }

  /* CONFETTI */
  .confetto {
    position: absolute;
    top: -20px;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: fall linear forwards;
    z-index: 210;
    pointer-events: none;
  }

  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
  }

  /* MOBILE TOUCH BUTTONS */
  #touchControls {
    position: absolute;
    bottom: 130px;
    width: 100%;
    display: none;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 20;
    pointer-events: none;
  }

  .touchBtn {
    width: 70px;
    height: 70px;
    min-width: 60px;
    min-height: 60px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 3px solid rgba(255,255,255,0.4);
    font-size: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: all;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
    color: #fff;
  }

  .touchBtn:active { background: rgba(255,255,255,0.35); }

  /* CHARACTER SELECT */
  #charSelect {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(16px, 4vh, 36px);
    z-index: 150;
    background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
    transition: opacity 0.4s ease;
  }

  #charSelect.fadeOut {
    opacity: 0;
    pointer-events: none;
  }

  .charTitle {
    font-size: clamp(16px, 5vw, 40px);
    font-weight: 900;
    color: #e94560;
    text-shadow: 0 0 20px #e94560, 0 0 40px #e94560;
    letter-spacing: 3px;
    text-align: center;
    padding: 0 20px;
  }

  .charGrid {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(14px, 3vw, 28px);
    justify-content: center;
    padding: 0 20px;
  }

  .charCard {
    width: clamp(110px, 22vw, 170px);
    background: rgba(255,255,255,0.05);
    border: 3px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 18px 14px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .charCard:hover {
    border-color: #00ff88;
    box-shadow: 0 0 20px rgba(0,255,136,0.3);
    transform: scale(1.05);
  }

  .charCard.selected {
    border-color: #00ff88;
    border-width: 4px;
    background: rgba(0,255,136,0.08);
    box-shadow: 0 0 30px rgba(0,255,136,0.45);
  }

  .charCard img {
    width: 75%;
    aspect-ratio: 1;
    object-fit: contain;
    border-radius: 8px;
  }

  .charName {
    font-size: clamp(14px, 3.5vw, 20px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
  }

  .charCheckmark {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 26px;
    height: 26px;
    background: #00ff88;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #000;
    font-weight: 900;
  }

  .charCard.selected .charCheckmark { display: flex; }

  #playBtn {
    padding: 14px 56px;
    font-size: clamp(18px, 5vw, 30px);
    font-weight: 900;
    color: #fff;
    background: linear-gradient(135deg, #e94560, #7b2ff7);
    border: none;
    border-radius: 50px;
    letter-spacing: 3px;
    box-shadow: 0 0 30px rgba(233,69,96,0.6);
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
    opacity: 0.3;
    pointer-events: none;
    cursor: default;
  }

  #playBtn.active {
    opacity: 1;
    pointer-events: all;
    cursor: pointer;
  }

  #playBtn.active:hover {
    transform: scale(1.08);
    box-shadow: 0 0 50px rgba(233,69,96,0.9);
  }

  /* GAME OVER */
  #gameOver {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
  }

  #gameOver.show { display: flex; }

  .gameOverText {
    font-size: clamp(32px, 10vw, 80px);
    font-weight: 900;
    color: #ff2244;
    text-shadow: 0 0 30px #ff2244, 0 0 60px #ff2244;
    letter-spacing: 4px;
    text-align: center;
    padding: 0 20px;
    animation: haPerso 2s ease forwards;
  }

  @keyframes haPerso {
    0%   { opacity: 0; transform: scale(0.4); }
    20%  { opacity: 1; transform: scale(1.1); }
    55%  { opacity: 1; transform: scale(1.0); }
    100% { opacity: 0; transform: scale(0.85); }
  }

  #rigiocaBtn {
    padding: 14px 50px;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 900;
    color: #fff;
    background: linear-gradient(135deg, #e94560, #7b2ff7);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 0 30px rgba(233,69,96,0.6);
    transition: transform 0.1s, box-shadow 0.1s;
    animation: fadeInBtn 0.5s ease 1.2s both;
  }

  @keyframes fadeInBtn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #rigiocaBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 50px rgba(233,69,96,0.9);
  }

  /* MESSAGGIO PANINO PERSO */
  #messaggioPerso {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    z-index: 150;
    pointer-events: none;
  }

  #messaggioPerso.show {
    display: flex;
    pointer-events: auto;
  }

  .persoTesto {
    font-size: clamp(28px, 7vw, 64px);
    font-weight: 900;
    color: #ff3333;
    text-shadow: 0 0 20px #ff3333, 0 0 50px #ff3333;
    letter-spacing: 4px;
    text-align: center;
    white-space: nowrap;
    animation: apparisciPerso 0.4s ease forwards;
  }

  @keyframes apparisciPerso {
    from { opacity: 0; transform: scale(0.4); }
    to   { opacity: 1; transform: scale(1);   }
  }

  #persoRigiocaBtn {
    display: none;
    padding: 14px 50px;
    font-size: clamp(18px, 4vw, 28px);
    font-weight: 900;
    color: #fff;
    background: linear-gradient(135deg, #e94560, #7b2ff7);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 0 30px rgba(233,69,96,0.6);
    transition: transform 0.1s, box-shadow 0.1s;
    animation: fadeInBtn 0.4s ease forwards;
  }

  #persoRigiocaBtn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 50px rgba(233,69,96,0.9);
  }

  #persoScore {
    font-size: clamp(16px, 3.5vw, 26px);
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    text-align: center;
    text-shadow: 0 0 10px rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<div id="gameContainer">
  <!-- CHARACTER SELECT -->
  <div id="charSelect">
    <div class="charTitle">SCEGLI IL TUO PERSONAGGIO</div>
    <div class="charGrid" id="charGrid"></div>
    <button id="playBtn" onclick="avviaGioco()">GIOCA!</button>
  </div>

  <!-- COUNTDOWN -->
  <div id="countdown" style="display:none">
    <div id="countdownNum">3</div>
  </div>

  <!-- HUD -->
  <div id="hud">🥪 <span id="score">0</span></div>

  <!-- UZI FACE -->
  <img id="uzi" src="" alt="Uzi">

  <!-- TUBE -->
  <div id="tube">
    <div class="tube-nozzle"></div>
    <div class="tube-mouth"></div>
    <div class="tube-body"></div>
  </div>

  <!-- WIN OVERLAY -->
  <div id="winOverlay">
    <div class="trophy">🏆</div>
    <div class="winText">HAI VINTO</div>
    <div class="uziText">UZIIIII!</div>
    <button id="replayBtn" onclick="startCountdown()">GIOCA ANCORA</button>
  </div>

  <!-- GAME OVER -->
  <div id="gameOver">
    <div class="gameOverText" id="gameOverText"></div>
    <button id="rigiocaBtn" onclick="rigioca()">RIGIOCA</button>
  </div>

  <!-- MESSAGGIO PANINO PERSO -->
  <div id="messaggioPerso">
    <div class="persoTesto" id="persoTesto"></div>
    <div id="persoScore"></div>
    <button id="persoRigiocaBtn" onclick="rigioca()">RIGIOCA</button>
  </div>

  <!-- TOUCH CONTROLS -->
  <div id="touchControls">
    <div class="touchBtn" id="btnLeft">◀</div>
    <div class="touchBtn" id="btnRight">▶</div>
  </div>
</div>

<script>
// ─── PERSONAGGI ──────────────────────────────────────────────────────────────
const personaggi = [
  { nome: "UZI",  chiusa: "uzi-chiusa.png",  aperta: "uzi-aperta.png"  },
  { nome: "ICIO", chiusa: "icio-chiusa.png",  aperta: "icio-aperta.png" },
  { nome: "PINO", chiusa: "pino-chiusa.png",  aperta: "pino-aperta.png" }
];
let personaggioScelto = null;

// ─── STATE ─────────────────────────────────────────────────────────────────
const SPEED         = 6;
const FIRE_INTERVAL = 1200;
const OPEN_DIST     = 80;
const EAT_DIST      = 50;
const SPEED_INCREMENT = 1.0; // aggiunto ogni 5 panini mangiati

function isMobile()           { return window.innerWidth < 600; }
function getUziW()            { return isMobile() ? 70 : 80; }
function getSandwichSpeed()   { return isMobile() ? 7.0 : 10.0; }
function getSandwichFontSize(){ return isMobile() ? '32px' : '38px'; }

function updateTouchControls() {
  document.getElementById('touchControls').style.display =
    isMobile() ? 'flex' : 'none';
}

let uziX, uziY;
let tubeX, tubeDir;
let sandwiches = [];
let score = 0;
let gameRunning = false;
let keys = { left: false, right: false };
let lastFireTime = 0;
let animId = null;
let fireTimerId = null;
let tubeAngle = 0;
let isMostrandoMessaggio = false;

// Audio context for beep
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

function playBeep() {
  const ctx = getAudio();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.12);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.2);
  } catch(e) {}
}

// ─── DOM REFS ───────────────────────────────────────────────────────────────
const container   = document.getElementById('gameContainer');
const countdownEl = document.getElementById('countdown');
const countNumEl  = document.getElementById('countdownNum');
const hudEl       = document.getElementById('hud');
const scoreEl     = document.getElementById('score');
const uziEl       = document.getElementById('uzi');
const tubeEl      = document.getElementById('tube');
const winOverlay  = document.getElementById('winOverlay');

// ─── CHARACTER SELECT ────────────────────────────────────────────────────────
function buildCharSelect() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  personaggi.forEach(p => {
    const card = document.createElement('div');
    card.className = 'charCard';
    card.innerHTML = `
      <div class="charCheckmark">✓</div>
      <img src="${p.chiusa}" alt="${p.nome}">
      <div class="charName">${p.nome}</div>`;
    card.addEventListener('click',       () => selezionaPersonaggio(p, card));
    card.addEventListener('touchend', e => { e.preventDefault(); selezionaPersonaggio(p, card); });
    grid.appendChild(card);
  });
  document.getElementById('charSelect').style.display = 'flex';
  document.getElementById('charSelect').style.opacity = '1';
  document.getElementById('charSelect').classList.remove('fadeOut');
  document.getElementById('playBtn').classList.remove('active');
  personaggioScelto = null;
}

function selezionaPersonaggio(p, cardEl) {
  personaggioScelto = p;
  document.querySelectorAll('.charCard').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  document.getElementById('playBtn').classList.add('active');
}

function avviaGioco() {
  if (!personaggioScelto) return;
  const sel = document.getElementById('charSelect');
  sel.classList.add('fadeOut');
  setTimeout(() => {
    sel.style.display = 'none';
    startCountdown();
  }, 400);
}

// ─── COUNTDOWN ──────────────────────────────────────────────────────────────
function startCountdown() {
  // reset game state
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  if (fireTimerId) { clearInterval(fireTimerId); fireTimerId = null; }
  sandwiches.forEach(s => s.el.remove());
  sandwiches = [];
  score = 0;
  scoreEl.textContent = '0';
  gameRunning = false;
  keys.left = keys.right = false;

  // remove old confetti
  document.querySelectorAll('.confetto').forEach(c => c.remove());

  winOverlay.classList.remove('show');
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('messaggioPerso').classList.remove('show');
  document.getElementById('persoRigiocaBtn').style.display = 'none';
  isMostrandoMessaggio = false;
  hudEl.style.display = 'none';
  tubeEl.style.display = 'none';
  uziEl.style.display = 'none';

  countdownEl.style.display = 'flex';

  const steps = ['3', '2', '1', 'START!'];
  let i = 0;

  function nextStep() {
    if (i >= steps.length) {
      countdownEl.style.display = 'none';
      beginGame();
      return;
    }
    countNumEl.classList.remove('doAnim');
    countNumEl.textContent = steps[i];
    // force reflow to restart animation
    void countNumEl.offsetWidth;
    countNumEl.classList.add('doAnim');
    i++;
    setTimeout(nextStep, 950);
  }
  nextStep();
}

// ─── BEGIN GAME ─────────────────────────────────────────────────────────────
function beginGame() {
  const W = container.clientWidth;
  const H = container.clientHeight;

  const UZI_W = getUziW();
  uziX = W / 2;
  uziY = 60;
  tubeX = W / 2;
  tubeDir = 1;
  tubeAngle = 0;

  uziEl.style.width  = UZI_W + 'px';
  uziEl.style.height = UZI_W + 'px';
  uziEl.style.display = 'block';
  uziEl.style.left = uziX + 'px';
  uziEl.style.top  = uziY + 'px';
  uziEl.src = personaggioScelto.chiusa;
  updateTouchControls();

  tubeEl.style.display = 'block';
  tubeEl.style.left = tubeX + 'px';

  hudEl.style.display = 'block';
  gameRunning = true;

  lastFireTime = performance.now();
  gameLoop(performance.now());
}

// ─── SANDWICH FACTORY ───────────────────────────────────────────────────────
function spawnSandwich() {
  const el = document.createElement('div');
  el.className = 'sandwich';
  el.textContent = '🥪';
  el.style.fontSize = getSandwichFontSize();
  container.appendChild(el);
  sandwiches.push({ el, x: tubeX, y: window.innerHeight - 120 });
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
function gameLoop(now) {
  if (!gameRunning) return;

  const W = window.innerWidth;
  const H = window.innerHeight;
  const UZI_W = getUziW();
  const SANDWICH_SPEED = getSandwichSpeed() + Math.floor(score / 5) * SPEED_INCREMENT;

  // ── Move Uzi
  if (keys.left)  uziX -= SPEED;
  if (keys.right) uziX += SPEED;
  uziX = Math.max(UZI_W / 2, Math.min(W - UZI_W / 2, uziX));
  uziEl.style.left = uziX + 'px';

  // ── Move Tube (sinusoidal)
  tubeAngle += 0.018;
  tubeX = W / 2 + Math.sin(tubeAngle) * (W / 2 - 60);
  tubeEl.style.left = tubeX + 'px';

  // ── Fire sandwich
  if (now - lastFireTime >= FIRE_INTERVAL) {
    spawnSandwich();
    lastFireTime = now;
  }

  // ── Move sandwiches, check collisions
  const uziCenterX = uziX;
  const uziCenterY = uziY + UZI_W / 2;
  const sogliaApertura = H * 0.15;
  let mouthOpen = false;

  // first pass: check proximity to decide mouth state (distanza verticale assoluta)
  for (const s of sandwiches) {
    if (Math.abs(uziCenterY - s.y) < sogliaApertura) { mouthOpen = true; break; }
  }

  uziEl.src = mouthOpen ? personaggioScelto.aperta : personaggioScelto.chiusa;

  const toRemove = [];

  for (let i = 0; i < sandwiches.length; i++) {
    const s = sandwiches[i];
    s.y -= SANDWICH_SPEED;
    s.el.style.left = s.x + 'px';
    s.el.style.top  = s.y + 'px';

    // off top — panino scappato: ferma il gioco
    if (s.y < -50) { mostraMessaggioPerso(); return; }

    // eat check
    const dx = Math.abs(s.x - uziCenterX);
    const dy = Math.abs(s.y - uziCenterY);
    if (mouthOpen && dx < EAT_DIST && dy < EAT_DIST) {
      toRemove.push(i);
      score++;
      scoreEl.textContent = score;
      playBeep();
    }
  }

  // remove in reverse order
  for (let i = toRemove.length - 1; i >= 0; i--) {
    sandwiches[toRemove[i]].el.remove();
    sandwiches.splice(toRemove[i], 1);
  }

  animId = requestAnimationFrame(gameLoop);
}

// ─── MESSAGGIO PANINO PERSO ──────────────────────────────────────────────────
function mostraMessaggioPerso() {
  if (isMostrandoMessaggio) return;
  isMostrandoMessaggio = true;

  // Ferma il gioco
  gameRunning = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  sandwiches.forEach(s => s.el.remove());
  sandwiches = [];

  // Mostra testo con animazione
  const testo = document.getElementById('persoTesto');
  testo.textContent = (personaggioScelto ? personaggioScelto.nome : 'UZI') + ' HAI PERSO';
  testo.style.animation = 'none';
  void testo.offsetWidth;
  testo.style.animation = '';

  document.getElementById('persoScore').textContent = 'Punteggio: ' + score + ' panini mangiati';
  document.getElementById('messaggioPerso').classList.add('show');

  // Pulsante RIGIOCA dopo 2 secondi
  setTimeout(() => {
    const btn = document.getElementById('persoRigiocaBtn');
    btn.style.animation = 'none';
    void btn.offsetWidth;
    btn.style.animation = '';
    btn.style.display = 'block';
  }, 2000);
}

// ─── GAME OVER ───────────────────────────────────────────────────────────────
function triggerGameOver() {
  gameRunning = false;
  sandwiches.forEach(s => s.el.remove());
  sandwiches = [];

  const textEl = document.getElementById('gameOverText');
  textEl.textContent = (personaggioScelto ? personaggioScelto.nome : 'UZI') + ' HAI PERSO';
  textEl.style.animation = 'none';
  void textEl.offsetWidth;
  textEl.style.animation = '';

  const btnEl = document.getElementById('rigiocaBtn');
  btnEl.style.animation = 'none';
  void btnEl.offsetWidth;
  btnEl.style.animation = '';

  document.getElementById('gameOver').classList.add('show');
}

function rigioca() {
  document.getElementById('gameOver').classList.remove('show');
  document.getElementById('messaggioPerso').classList.remove('show');
  document.getElementById('persoRigiocaBtn').style.display = 'none';
  isMostrandoMessaggio = false;
  buildCharSelect();
}

// ─── WIN ─────────────────────────────────────────────────────────────────────
function triggerWin() {
  gameRunning = false;
  sandwiches.forEach(s => s.el.remove());
  sandwiches = [];
  uziEl.src = personaggioScelto.aperta;

  winOverlay.classList.add('show');
  spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#ff0000','#ff7700','#ffff00','#00ff00','#00ccff','#8800ff','#ff00cc','#fff'];
  const W = container.clientWidth;
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetto';
    el.style.left   = Math.random() * W + 'px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width  = (8 + Math.random() * 10) + 'px';
    el.style.height = (8 + Math.random() * 10) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    const dur = 2 + Math.random() * 3;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay    = (Math.random() * 1.5) + 's';
    container.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  { keys.left  = true; e.preventDefault(); }
  if (e.key === 'ArrowRight') { keys.right = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  keys.left  = false;
  if (e.key === 'ArrowRight') keys.right = false;
});

// Touch buttons
const btnLeft  = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
btnLeft.addEventListener('touchstart',  e => { keys.left  = true;  e.preventDefault(); }, { passive: false });
btnLeft.addEventListener('touchend',    e => { keys.left  = false; e.preventDefault(); }, { passive: false });
btnLeft.addEventListener('mousedown',   () => keys.left  = true);
btnLeft.addEventListener('mouseup',     () => keys.left  = false);
btnLeft.addEventListener('mouseleave',  () => keys.left  = false);
btnRight.addEventListener('touchstart', e => { keys.right = true;  e.preventDefault(); }, { passive: false });
btnRight.addEventListener('touchend',   e => { keys.right = false; e.preventDefault(); }, { passive: false });
btnRight.addEventListener('mousedown',  () => keys.right = true);
btnRight.addEventListener('mouseup',    () => keys.right = false);
btnRight.addEventListener('mouseleave', () => keys.right = false);

// ─── PREVENT SCROLL ON TOUCH ─────────────────────────────────────────────────
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ─── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const W = window.innerWidth;
  const UZI_W = getUziW();
  uziEl.style.width  = UZI_W + 'px';
  uziEl.style.height = UZI_W + 'px';
  if (gameRunning) {
    uziX = Math.max(UZI_W / 2, Math.min(W - UZI_W / 2, uziX));
    tubeX = Math.max(60, Math.min(W - 60, tubeX));
  }
  updateTouchControls();
});

// ─── START ───────────────────────────────────────────────────────────────────
buildCharSelect();
</script>
</body>
